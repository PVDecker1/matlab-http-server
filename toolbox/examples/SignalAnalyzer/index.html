<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Analyzer - MATLAB HTTP Server</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [status, setStatus] = useState(null);
            const [signal, setSignal] = useState([]);
            const [analysis, setAnalysis] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const API_URL = 'http://localhost:8080/api';

            useEffect(() => {
                fetchStatus();
            }, []);

            const fetchStatus = async () => {
                try {
                    const resp = await fetch(`${API_URL}/status`);
                    const data = await resp.json();
                    setStatus(data);
                } catch (err) {
                    setError("Could not connect to MATLAB server. Is it running on port 8080?");
                }
            };

            const generateSignal = async (type) => {
                setLoading(true);
                setError(null);
                try {
                    const resp = await fetch(`${API_URL}/generate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ type, points: 50, amplitude: 5.0 })
                    });
                    const data = await resp.json();
                    setSignal(data.signal);
                    setAnalysis(null);
                } catch (err) {
                    setError("Generation failed: " + err.message);
                }
                setLoading(false);
            };

            const analyzeSignal = async () => {
                if (signal.length === 0) return;
                setLoading(true);
                setError(null);
                try {
                    const resp = await fetch(`${API_URL}/analyze`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ signal, windowSize: 5 })
                    });
                    const data = await resp.json();
                    setAnalysis(data);
                } catch (err) {
                    setError("Analysis failed: " + err.message);
                }
                setLoading(false);
            };

            return (
                <div className="max-w-5xl mx-auto p-8">
                    <header className="mb-12 flex justify-between items-end border-b border-slate-200 pb-6">
                        <div>
                            <h1 className="text-4xl font-bold text-slate-900 mb-2">Signal Analyzer</h1>
                            <p className="text-slate-500 font-medium">MATLAB + React Real-time Integration</p>
                        </div>
                        {status && (
                            <div className="text-right">
                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Server Status</p>
                                <div className="flex items-center gap-2 text-sm text-slate-600">
                                    <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                                    MATLAB {status.version.split(' ')[0]}
                                </div>
                            </div>
                        )}
                    </header>

                    {error && (
                        <div className="bg-rose-50 border-l-4 border-rose-500 p-4 mb-8 text-rose-700 rounded-r-lg shadow-sm">
                            <p className="font-bold mb-1">Connection Error</p>
                            <p className="text-sm">{error}</p>
                        </div>
                    )}

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-1 space-y-8">
                            {/* Controls */}
                            <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                <h2 className="text-lg font-bold mb-4 text-slate-800">Signal Generation</h2>
                                <div className="grid grid-cols-1 gap-3">
                                    <button 
                                        onClick={() => generateSignal('sine')}
                                        className="w-full px-4 py-3 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 active:scale-[0.98] transition shadow-md shadow-indigo-100"
                                    >
                                        Generate Sine Wave
                                    </button>
                                    <button 
                                        onClick={() => generateSignal('noise')}
                                        className="w-full px-4 py-3 bg-white text-slate-700 font-semibold border-2 border-slate-200 rounded-xl hover:bg-slate-50 active:scale-[0.98] transition"
                                    >
                                        Inject Gaussian Noise
                                    </button>
                                </div>
                            </section>

                            <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                <h2 className="text-lg font-bold mb-4 text-slate-800">Processing</h2>
                                <button 
                                    onClick={analyzeSignal}
                                    disabled={signal.length === 0 || loading}
                                    className="w-full px-4 py-3 bg-emerald-600 text-white font-semibold rounded-xl hover:bg-emerald-700 active:scale-[0.98] transition shadow-md shadow-emerald-100 disabled:opacity-50 disabled:scale-100"
                                >
                                    {loading ? 'Processing...' : 'Run MATLAB Analysis'}
                                </button>
                            </section>
                        </div>

                        <div className="lg:col-span-2 space-y-8">
                            {/* Visualization */}
                            <section className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 min-h-[300px]">
                                <h2 className="text-lg font-bold mb-6 text-slate-800">Signal Visualization</h2>
                                <div className="bg-slate-50 rounded-xl p-6 h-48 flex items-end gap-1 border border-slate-100">
                                    {signal.length > 0 ? (
                                        signal.map((v, i) => (
                                            <div 
                                                key={i} 
                                                className="bg-indigo-500 w-full rounded-t-[2px] transition-all duration-500" 
                                                style={{ height: `${Math.abs(v) * 15}%`, minHeight: '4px' }}
                                            />
                                        ))
                                    ) : (
                                        <div className="w-full h-full flex flex-col items-center justify-center text-slate-400">
                                            <svg className="w-12 h-12 mb-2 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                                            </svg>
                                            <p className="text-sm italic">Generate a signal to begin visualization</p>
                                        </div>
                                    )}
                                </div>
                            </section>

                            {/* Results */}
                            {analysis && (
                                <section className="bg-white p-8 rounded-2xl shadow-sm border-2 border-emerald-500/20 animate-in fade-in slide-in-from-bottom-4 duration-700">
                                    <h2 className="text-lg font-bold mb-6 text-slate-800">MATLAB Statistics</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                        {[
                                            { label: 'Mean', value: analysis.mean, color: 'text-blue-600' },
                                            { label: 'Median', value: analysis.median, color: 'text-indigo-600' },
                                            { label: 'Std Dev', value: analysis.std, color: 'text-emerald-600' }
                                        ].map((stat, idx) => (
                                            <div key={idx} className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{stat.label}</p>
                                                <p className={`text-2xl font-bold ${stat.color}`}>{stat.value.toFixed(4)}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-8">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Moving Average Vector (Sample)</p>
                                        <div className="bg-slate-900 rounded-xl p-4 font-mono text-[10px] text-emerald-400 overflow-x-auto shadow-inner leading-relaxed">
                                            {analysis.movingAverage.slice(0, 15).map(v => v.toFixed(3)).join(' , ')} ...
                                        </div>
                                    </div>
                                </section>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
